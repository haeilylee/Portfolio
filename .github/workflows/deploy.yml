name: Deploy
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx vercel deploy --prod --yes --token=${{ secrets.VERCEL_TOKEN }} --scope=haeilylees-projects
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
